<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
<script>
    // البحث عن النص المشفر بعد علامة ?
    const params = new URLSearchParams(window.location.search);
    const encodedUrl = params.get('url');

    if (encodedUrl) {
        try {
            // فك التشفير
            const originalUrl = atob(encodedUrl);
            
            // التأكد إنه رابط وتحويل المستخدم فوراً
            if (originalUrl.startsWith('http://') || originalUrl.startsWith('https://')) {
                window.location.replace(originalUrl);
            } else {
                document.write('الرابط الأصلي مش صحيح!');
            }
        } catch (e) {
            document.write('حصل خطأ في فك التشفير!');
        }
    } else {
        document.write('أهلاً بك في مخفي الروابط!');
    }
</script>
</body>
</html>
